<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent | TUYIZERE Federance</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Rajdhani',sans-serif;background:#06090f;color:#ddeeff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .box{max-width:520px;background:rgba(10,20,35,0.9);border:1px solid rgba(0,220,255,0.2);border-radius:20px;padding:3rem 2.5rem}
    .icon{font-size:4rem;color:#00ff9d;margin-bottom:1.5rem;animation:pop .5s ease}
    @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
    h1{font-family:'Orbitron',monospace;font-size:1.6rem;color:#00dcff;margin-bottom:1rem;letter-spacing:2px;text-transform:uppercase}
    p{color:#8ab0c8;font-size:1rem;line-height:1.8;margin-bottom:2rem}
    a{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#0080ff,#00dcff);color:#000;font-weight:700;font-size:.9rem;padding:.7rem 1.8rem;border-radius:8px;text-decoration:none;text-transform:uppercase;letter-spacing:1px;transition:.25s}
    a:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,220,255,.4)}
    .tag{font-family:'Orbitron',monospace;font-size:.7rem;color:rgba(0,220,255,.5);letter-spacing:3px;margin-bottom:1rem;display:block}
  </style>
</head>
<body>
  <div class="box">
    <div class="icon"><i class="fas fa-check-circle"></i></div>
    <span class="tag">// MESSAGE RECEIVED</span>
    <h1>Thank You!</h1>
    <p>Your message has been sent successfully. I appreciate you reaching out and I will get back to you <strong style="color:#00dcff">within 24 hours</strong>.</p>
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
  </div>
</body>
</html>
